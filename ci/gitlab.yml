# KelpMesh CI/CD template for GitLab
#
# Copy this file to your KelpMesh project as .gitlab-ci.yml

stages:
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

kelpmesh-build:
  stage: build
  image: python:3.11-slim
  before_script:
    - pip install kelpmesh
  script:
    - kelpmesh scan secrets --fail
    - kelpmesh build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.sql"
        - "kelpmesh.yml"
        - "models/**/*"
        - "tests/**/*"
    - if: $CI_COMMIT_BRANCH == "main"
