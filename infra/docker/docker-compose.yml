version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kelpmesh
      POSTGRES_PASSWORD: ${KELPMESH_DB_PASSWORD:-changeme}
      POSTGRES_DB: kelpmesh_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelpmesh -d kelpmesh_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  studio:
    build:
      context: ../..
      dockerfile: extensions/studio/Dockerfile
    ports:
      - "${KELPMESH_STUDIO_PORT:-8765}:8765"
    volumes:
      - studio_data:/data
      - ./projects:/projects
    environment:
      KELPMESH_STUDIO_DATA: /data
      KELPMESH_STUDIO_HOST: 0.0.0.0
      KELPMESH_STUDIO_PORT: 8765
      KELPMESH_STUDIO_DATABASE_URL: postgresql://kelpmesh:${KELPMESH_DB_PASSWORD:-changeme}@postgres:5432/kelpmesh_studio
      KELPMESH_STUDIO_JWT_SECRET: ${KELPMESH_STUDIO_JWT_SECRET:-change-me-in-production}
      KELPMESH_STUDIO_CORS_ORIGINS: http://localhost:8765
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  studio_data:
