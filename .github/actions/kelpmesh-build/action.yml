name: "KelpMesh Build"
description: "Run kelpmesh build (models + tests) on a KelpMesh project"

inputs:
  project-dir:
    description: "Path to the KelpMesh project directory"
    required: false
    default: "."
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  install-args:
    description: "Extra pip install arguments"
    required: false
    default: ""
  slim-ci:
    description: "Only run changed models (true/false)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install KelpMesh
      shell: bash
      run: python -m pip install kelpmesh ${{ inputs.install-args }}

    - name: Run kelpmesh build (full)
      if: ${{ inputs.slim-ci != 'true' }}
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: kelpmesh build

    - name: Run kelpmesh build (slim CI — changed models only)
      if: ${{ inputs.slim-ci == 'true' }}
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: kelpmesh run --changed
