name: KelpMesh CI

on:
  pull_request:
    paths:
      - "models/**"
      - "tests/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "kelpmesh.yml"
      - "**.sql"
      - "**.py"
  push:
    branches: [main, master]

# Needed to post PR comments
permissions:
  contents:      read
  pull-requests: write

jobs:
  kelpmesh-ci:
    name: KelpMesh CI (slim)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for slim CI diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install KelpMesh
        run: pip install -e .

      - name: Scan for secrets
        run: kelpmesh scan secrets --fail

      - name: KelpMesh CI — slim run + tests + PR comment
        run: kelpmesh ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: defer unchanged models to production state
          # KELPMESH_PROD_STATE: ${{ secrets.KELPMESH_PROD_STATE_PATH }}

  # ── Full matrix runs on push to main only ─────────────────────────────
  full-build:
    name: Full build (${{ matrix.os }} / Python ${{ matrix.python }})
    if: github.event_name == 'push'
    needs: kelpmesh-ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:     [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e .
      - run: kelpmesh build
