name: CI

on:
  pull_request:
    paths:
      - "**.sql"
      - "kelpmesh.yml"
      - "models/**"
      - "tests/**"
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install KelpMesh
        run: pip install kelpmesh
      - name: Secrets scan
        run: kelpmesh scan secrets --fail
      - name: kelpmesh build (slim CI — changed models only)
        uses: ./.github/actions/kelpmesh-build
        with:
          project-dir: .
          slim-ci: "true"
