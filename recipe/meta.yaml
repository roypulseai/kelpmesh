{% set version = "0.2.0" %}

package:
  name: briq
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/b/briq/briq-{{ version }}.tar.gz
  # sha256: <fill in after PyPI upload — run: pip download briq==0.2.0 && sha256sum briq-0.2.0.tar.gz>

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - briq = briq.cli.main:main

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11
    - typer >=0.12
    - sqlglot >=25.0
    - networkx >=3.0
    - duckdb >=1.0
    - pydantic >=2.0
    - rich >=13.0
    - jinja2 >=3.0
    - pyyaml >=6.0
    - sqlparse >=0.5
    - cryptography >=42.0

test:
  imports:
    - briq
    - briq.cli.main
    - briq.core.executor
    - briq.core.substitutions
    - briq.core.macros
    - briq.adapters.duckdb
  commands:
    - briq --help
    - briq run --help
    - briq compile --help
    - briq plan --help

about:
  home: https://github.com/saikatxtreme/briq
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: "Pure SQL transformation and data modelling platform — a modern alternative to dbt"
  description: |
    briq is an open-source, pure-SQL data transformation platform that competes
    with dbt Core and SQLmesh. Key differentiators: zero telemetry (enforced by
    code), briq compile (renders all substitutions without warehouse access),
    briq plan (Terraform-style dry run with downstream impact), built-in PII
    scanning, RLS, and audit logging.

    Supports: DuckDB, Postgres, Snowflake, BigQuery, Databricks, Microsoft
    Fabric, and Amazon Redshift — with full incremental merge and SCD Type 2
    snapshots on every adapter.
  doc_url: https://github.com/saikatxtreme/briq/wiki
  dev_url: https://github.com/saikatxtreme/briq

extra:
  recipe-maintainers:
    - saikatxtreme
