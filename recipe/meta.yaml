{% set version = "0.2.0" %}

package:
  name: kelpmesh
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/k/kelpmesh/kelpmesh-{{ version }}.tar.gz
  # sha256: <fill in after PyPI upload — run: pip download kelpmesh==0.2.0 && sha256sum kelpmesh-0.2.0.tar.gz>

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - kelpmesh = kelpmesh.cli.main:main

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11
    - typer >=0.12
    - sqlglot >=25.0
    - networkx >=3.0
    - duckdb >=1.0
    - pydantic >=2.0
    - rich >=13.0
    - jinja2 >=3.0
    - pyyaml >=6.0
    - sqlparse >=0.5
    - cryptography >=42.0

test:
  imports:
    - kelpmesh
    - kelpmesh.cli.main
    - kelpmesh.core.executor
    - kelpmesh.core.substitutions
    - kelpmesh.core.macros
    - kelpmesh.adapters.duckdb
  commands:
    - kelpmesh --help
    - kelpmesh run --help
    - kelpmesh compile --help
    - kelpmesh plan --help

about:
  home: https://github.com/RoyPulseAI/kelpmesh
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: "Pure SQL transformation and data modelling platform — a modern alternative to dbt"
  description: |
    KelpMesh is an open-source, pure-SQL data transformation platform that competes
    with dbt Core and SQLmesh. Key differentiators: zero telemetry (enforced by
    code), kelpmesh compile (renders all substitutions without warehouse access),
    kelpmesh plan (Terraform-style dry run with downstream impact), built-in PII
    scanning, RLS, and audit logging.

    Supports: DuckDB, Postgres, Snowflake, BigQuery, Databricks, Microsoft
    Fabric, and Amazon Redshift — with full incremental merge and SCD Type 2
    snapshots on every adapter.
  doc_url: https://github.com/RoyPulseAI/kelpmesh/wiki
  dev_url: https://github.com/RoyPulseAI/kelpmesh

extra:
  recipe-maintainers:
    - RoyPulseAI
