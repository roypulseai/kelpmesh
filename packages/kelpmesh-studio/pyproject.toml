[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kelpmesh-studio"
version = "1.0.9"
description = "KelpMesh Studio — browser dashboard for KelpMesh (FastAPI UI layer, freemium)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Roy Pulse AI", email = "roypulse.ai@gmail.com" },
]
keywords = ["kelpmesh", "dbt", "sql", "analytics", "studio", "dashboard"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Topic :: Database",
]
dependencies = [
    "KelpMesh>=1.0.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "python-multipart>=0.0.6",
]

[project.urls]
Homepage = "https://github.com/roypulseai/kelpmesh"
Repository = "https://github.com/roypulseai/kelpmesh"

[project.scripts]
kelpmesh-studio = "kelpmesh_studio.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["kelpmesh_studio"]
